<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Triage OCR Check - ฟรี</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/tesseract.js/4.1.1/tesseract.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 15px;
        }
        
        .container {
            max-width: 1000px;
            margin: 0 auto;
            background: white;
            border-radius: 12px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
            overflow: hidden;
        }
        
        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 25px;
            text-align: center;
        }
        
        .header h1 {
            font-size: 24px;
            margin-bottom: 5px;
        }
        
        .header p {
            font-size: 13px;
            opacity: 0.9;
        }
        
        .content {
            padding: 20px;
        }
        
        .section {
            margin-bottom: 20px;
        }
        
        .section h2 {
            color: #333;
            font-size: 16px;
            margin-bottom: 12px;
            border-bottom: 2px solid #667eea;
            padding-bottom: 8px;
        }
        
        .upload-area {
            border: 3px dashed #667eea;
            border-radius: 8px;
            padding: 30px;
            text-align: center;
            background: #f8f9fa;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .upload-area:hover {
            background: #e7f3ff;
            border-color: #764ba2;
        }
        
        .upload-area.dragover {
            background: #e7f3ff;
            border-color: #764ba2;
            transform: scale(1.02);
        }
        
        .upload-text {
            font-size: 18px;
            color: #667eea;
            margin-bottom: 10px;
            font-weight: 600;
        }
        
        .upload-subtext {
            font-size: 13px;
            color: #666;
        }
        
        #fileInput {
            display: none;
        }
        
        .button-group {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
            gap: 10px;
            margin-top: 15px;
        }
        
        button {
            padding: 10px 15px;
            border: none;
            border-radius: 6px;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .btn-ocr {
            background: #ffc107;
            color: #333;
        }
        
        .btn-ocr:hover:not(:disabled) {
            background: #e0a800;
            transform: translateY(-2px);
        }
        
        .btn-ocr:disabled {
            background: #ccc;
            cursor: not-allowed;
            opacity: 0.6;
        }
        
        .btn-export {
            background: #007bff;
            color: white;
        }
        
        .btn-export:hover {
            background: #0056b3;
            transform: translateY(-2px);
        }
        
        .btn-clear {
            background: #dc3545;
            color: white;
        }
        
        .btn-clear:hover {
            background: #c82333;
        }
        
        .btn-delete {
            background: #fd7e14;
            color: white;
            padding: 6px 10px;
            font-size: 11px;
        }
        
        .btn-delete:hover {
            background: #e86b00;
        }
        
        .file-list {
            background: #f8f9fa;
            padding: 15px;
            border-radius: 8px;
            margin-top: 15px;
        }
        
        .file-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px;
            background: white;
            border-radius: 6px;
            margin-bottom: 8px;
            border-left: 4px solid #667eea;
        }
        
        .file-name {
            flex: 1;
            font-size: 13px;
            color: #333;
        }
        
        .file-status {
            font-size: 12px;
            padding: 4px 8px;
            border-radius: 4px;
            margin: 0 10px;
        }
        
        .status-pending {
            background: #fff3cd;
            color: #856404;
        }
        
        .progress-bar {
            width: 100%;
            height: 24px;
            background: #e9ecef;
            border-radius: 4px;
            overflow: hidden;
            margin: 15px 0;
        }
        
        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #667eea, #764ba2);
            width: 0%;
            transition: width 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 12px;
            font-weight: 600;
        }
        
        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
            gap: 10px;
            margin-bottom: 15px;
        }
        
        .stat-card {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 15px;
            border-radius: 8px;
            text-align: center;
        }
        
        .stat-card.error {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
        }
        
        .stat-number {
            font-size: 28px;
            font-weight: bold;
        }
        
        .stat-label {
            font-size: 11px;
            opacity: 0.9;
        }
        
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 10px;
            font-size: 13px;
        }
        
        thead {
            background: #667eea;
            color: white;
        }
        
        th {
            padding: 10px;
            text-align: left;
            font-weight: 600;
        }
        
        td {
            padding: 10px;
            border-bottom: 1px solid #ddd;
        }
        
        tbody tr:hover {
            background: #f8f9fa;
        }
        
        .status-ok {
            background: #d4edda;
            color: #155724;
            padding: 4px 8px;
            border-radius: 4px;
            font-weight: 600;
            text-align: center;
            font-size: 12px;
        }
        
        .status-error {
            background: #f8d7da;
            color: #721c24;
            padding: 4px 8px;
            border-radius: 4px;
            font-weight: 600;
            text-align: center;
            font-size: 12px;
        }
        
        .empty-message {
            text-align: center;
            color: #999;
            padding: 30px;
            font-size: 13px;
        }
        
        .note {
            background: #e7f3ff;
            padding: 12px;
            border-radius: 6px;
            margin-bottom: 15px;
            border-left: 4px solid #667eea;
            font-size: 12px;
            color: #333;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>📸 Triage OCR Check - ฟรี</h1>
            <p>ใช้ Tesseract OCR (ฟรี ไม่ต้องจ่าย)</p>
        </div>
        
        <div class="content">
            <div class="note">
                <strong>✅ ข้อดี:</strong> ใช้ฟรี ไม่ต้องจ่ายเงิน ใช้ได้ถาวร
            </div>
            
            <div class="section">
                <h2>📤 Upload รูป</h2>
                <div class="upload-area" id="uploadArea">
                    <div class="upload-text">📸 ลาก-วาง รูป หรือ คลิก</div>
                    <div class="upload-subtext">รองรับ JPG, PNG (หลายไฟล์พร้อมกัน)</div>
                </div>
                <input type="file" id="fileInput" multiple accept="image/*">
                
                <div class="file-list" id="fileList" style="display: none;">
                    <h3 style="margin-bottom: 10px; font-size: 14px;">📁 ไฟล์ที่อัพโหลด:</h3>
                    <div id="fileItems"></div>
                </div>
            </div>
            
            <div class="section" id="progressSection" style="display: none;">
                <h2>⏳ ความคืบหน้า</h2>
                <div class="progress-bar">
                    <div class="progress-fill" id="progressFill">0%</div>
                </div>
                <p id="progressText" style="text-align: center; font-size: 13px; color: #666;"></p>
            </div>
            
            <div class="section">
                <div class="button-group">
                    <button class="btn-ocr" id="ocrBtn" onclick="startOCRBatch()" disabled>🔍 OCR ทั้งหมด</button>
                    <button class="btn-export" onclick="exportReport()" disabled id="exportBtn">📊 Export</button>
                    <button class="btn-clear" onclick="clearAll()">🗑️ ล้าง</button>
                </div>
            </div>
            
            <div class="section" id="statsSection" style="display: none;">
                <div class="stats">
                    <div class="stat-card">
                        <div class="stat-number" id="totalCount">0</div>
                        <div class="stat-label">รวม</div>
                    </div>
                    <div class="stat-card error">
                        <div class="stat-number" id="errorCount">0</div>
                        <div class="stat-label">Triage ผิด</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-number" id="correctCount">0</div>
                        <div class="stat-label">Triage ถูก</div>
                    </div>
                </div>
            </div>
            
            <div class="section">
                <h2>📈 ผลลัพธ์</h2>
                <div id="tableContainer"></div>
            </div>
        </div>
    </div>
    
    <script>
        let uploadedFiles = [];
        let results = [];
        
        const uploadArea = document.getElementById('uploadArea');
        const fileInput = document.getElementById('fileInput');
        
        uploadArea.addEventListener('click', () => fileInput.click());
        
        uploadArea.addEventListener('dragover', (e) => {
            e.preventDefault();
            uploadArea.classList.add('dragover');
        });
        
        uploadArea.addEventListener('dragleave', () => {
            uploadArea.classList.remove('dragover');
        });
        
        uploadArea.addEventListener('drop', (e) => {
            e.preventDefault();
            uploadArea.classList.remove('dragover');
            handleFiles(e.dataTransfer.files);
        });
        
        fileInput.addEventListener('change', (e) => {
            handleFiles(e.target.files);
        });
        
        function handleFiles(files) {
            uploadedFiles = Array.from(files);
            displayFileList();
            document.getElementById('ocrBtn').disabled = uploadedFiles.length === 0;
        }
        
        function displayFileList() {
            const fileList = document.getElementById('fileList');
            const fileItems = document.getElementById('fileItems');
            
            if (uploadedFiles.length === 0) {
                fileList.style.display = 'none';
                return;
            }
            
            fileList.style.display = 'block';
            fileItems.innerHTML = uploadedFiles.map((file, idx) => `
                <div class="file-item">
                    <div class="file-name">📄 ${file.name}</div>
                    <div class="file-status status-pending">รอ OCR</div>
                    <button class="btn-delete" onclick="removeFile(${idx})">ลบ</button>
                </div>
            `).join('');
        }
        
        function removeFile(idx) {
            uploadedFiles.splice(idx, 1);
            displayFileList();
            document.getElementById('ocrBtn').disabled = uploadedFiles.length === 0;
        }
        
        async function startOCRBatch() {
            results = [];
            document.getElementById('progressSection').style.display = 'block';
            document.getElementById('ocrBtn').disabled = true;
            
            for (let i = 0; i < uploadedFiles.length; i++) {
                await ocrFile(uploadedFiles[i], i, uploadedFiles.length);
            }
            
            document.getElementById('progressSection').style.display = 'none';
            document.getElementById('ocrBtn').disabled = false;
            document.getElementById('exportBtn').disabled = results.length === 0;
            displayResults();
        }
        
        async function ocrFile(file, index, total) {
            const reader = new FileReader();
            
            return new Promise((resolve) => {
                reader.onload = async (e) => {
                    try {
                        updateProgress(index, total, file.name);
                        
                        const { data: { text } } = await Tesseract.recognize(
                            e.target.result,
                            'tha'
                        );
                        
                        const hn = extractNumber(text, /HN[:\s]+(\d+)/) || '-';
                        const triage1 = extractNumber(text, /Triage.*?1[:\s]*(\d)/) || '-';
                        const triage2 = extractNumber(text, /Triage.*?2[:\s]*(\d)/) || '-';
                        
                        const result = {
                            fileName: file.name,
                            hn: hn,
                            name: '-',
                            triage1: triage1,
                            triage2: triage2,
                            dx: '-',
                            timeReport: '-',
                            status: (triage1 !== '-' && triage2 !== '-' && triage1 === triage2) ? 'ถูก' : 'ผิด'
                        };
                        
                        results.push(result);
                        
                    } catch (err) {
                        results.push({
                            fileName: file.name,
                            hn: '-',
                            name: '-',
                            triage1: '-',
                            triage2: '-',
                            dx: '-',
                            timeReport: '-',
                            status: 'Error'
                        });
                    }
                    
                    updateProgress(index + 1, total, file.name);
                    resolve();
                };
                
                reader.readAsDataURL(file);
            });
        }
        
        function extractNumber(text, regex) {
            const match = text.match(regex);
            return match ? match[1] : null;
        }
        
        function updateProgress(current, total, fileName) {
            const percent = Math.round((current / total) * 100);
            document.getElementById('progressFill').style.width = percent + '%';
            document.getElementById('progressFill').textContent = percent + '%';
            document.getElementById('progressText').textContent = `${current}/${total} - ${fileName}`;
        }
        
        function displayResults() {
            const container = document.getElementById('tableContainer');
            const statsSection = document.getElementById('statsSection');
            
            if (results.length === 0) {
                container.innerHTML = '<div class="empty-message">📭 ยังไม่มีผลลัพธ์</div>';
                statsSection.style.display = 'none';
                return;
            }
            
            statsSection.style.display = 'block';
            const total = results.length;
            const errors = results.filter(r => r.status === 'ผิด').length;
            const correct = results.filter(r => r.status === 'ถูก').length;
            
            document.getElementById('totalCount').textContent = total;
            document.getElementById('errorCount').textContent = errors;
            document.getElementById('correctCount').textContent = correct;
            
            let html = '<table><thead><tr><th>#</th><th>HN</th><th>T1</th><th>T2</th><th>สถานะ</th></tr></thead><tbody>';
            
            results.forEach((r, i) => {
                const statusClass = r.status === 'ถูก' ? 'status-ok' : 'status-error';
                const statusText = r.status === 'ถูก' ? '✓ ถูก' : '✗ ผิด';
                html += `<tr><td>${i+1}</td><td>${r.hn}</td><td>${r.triage1}</td><td>${r.triage2}</td><td><div class="${statusClass}">${statusText}</div></td></tr>`;
            });
            
            html += '</tbody></table>';
            container.innerHTML = html;
        }
        
        function exportReport() {
            if (results.length === 0) {
                alert('⚠️ ไม่มีข้อมูล');
                return;
            }
            
            const ws_data = [['รายงาน Triage'], ['วันที่:', new Date().toLocaleString('th-TH')], [], ['#', 'HN', 'T1', 'T2', 'สถานะ']];
            
            results.forEach((r, i) => {
                if (r.status === 'ผิด') {
                    ws_data.push([i+1, r.hn, r.triage1, r.triage2, r.status]);
                }
            });
            
            const ws = XLSX.utils.aoa_to_sheet(ws_data);
            const wb = XLSX.utils.book_new();
            XLSX.utils.book_append_sheet(wb, ws, 'Report');
            XLSX.writeFile(wb, `Triage-${new Date().toLocaleDateString('th-TH')}.xlsx`);
        }
        
        function clearAll() {
            if (confirm('ล้างข้อมูล?')) {
                uploadedFiles = [];
                results = [];
                fileInput.value = '';
                document.getElementById('fileList').style.display = 'none';
                document.getElementById('tableContainer').innerHTML = '';
                document.getElementById('statsSection').style.display = 'none';
                document.getElementById('ocrBtn').disabled = true;
            }
        }
    </script>
</body>
</html>
